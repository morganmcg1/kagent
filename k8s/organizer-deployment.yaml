apiVersion: apps/v1
kind: Deployment
metadata:
  name: kagent-organizer
  labels:
    app: kagent
    role: organizer
    research-tag: {{RESEARCH_TAG}}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kagent
      role: organizer
  template:
    metadata:
      labels:
        app: kagent
        role: organizer
        research-tag: {{RESEARCH_TAG}}
    spec:
      containers:
      - name: organizer
        image: {{IMAGE}}
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -e
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          git clone --branch "$REPO_BRANCH" "$REPO_URL" /workspace/kagent
          cd /workspace/kagent
          bash k8s/entrypoint-organizer.sh
        envFrom:
        - configMapRef:
            name: kagent-config-organizer
        env:
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: kagent-secrets
              key: wandb-api-key
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: kagent-secrets
              key: github-token
        resources:
          requests:
            cpu: "16"
            memory: "128Gi"
          limits:
            cpu: "16"
            memory: "128Gi"
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: dataset
          mountPath: /mnt/new-pvc
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi
      - name: dataset
        persistentVolumeClaim:
          claimName: new-pvc
