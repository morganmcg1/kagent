apiVersion: batch/v1
kind: Job
metadata:
  name: kagent-train-{{RUN_NAME}}
  labels:
    app: kagent
    role: train
    research-tag: {{RESEARCH_TAG}}
spec:
  ttlSecondsAfterFinished: 7200
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: kagent
        role: train
        research-tag: {{RESEARCH_TAG}}
    spec:
      restartPolicy: Never
      containers:
      - name: train
        image: {{IMAGE}}
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -e
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          git clone --branch "$REPO_BRANCH" "$REPO_URL" /workspace/kagent
          cd /workspace/kagent
          uv pip install --system -e .
          {{TRAIN_CMD}}
        envFrom:
        - configMapRef:
            name: kagent-config-train-{{RUN_NAME}}
        env:
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: kagent-secrets
              key: wandb-api-key
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: kagent-secrets
              key: github-token
        resources:
          requests:
            cpu: "8"
            memory: "64Gi"
            nvidia.com/gpu: "1"
          limits:
            cpu: "16"
            memory: "128Gi"
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: dataset
          mountPath: /mnt/new-pvc
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi
      - name: dataset
        persistentVolumeClaim:
          claimName: new-pvc
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
