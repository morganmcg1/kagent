apiVersion: batch/v1
kind: Job
metadata:
  name: kagent-{{COMPETITION_LABEL}}-prepare
  labels:
    app: kagent
    role: prepare
    competition: {{COMPETITION_LABEL}}
    research-tag: {{RESEARCH_TAG}}
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: kagent
        role: prepare
        competition: {{COMPETITION_LABEL}}
        research-tag: {{RESEARCH_TAG}}
    spec:
      restartPolicy: Never
      containers:
      - name: prepare
        image: {{IMAGE}}
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -e
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          git clone --branch "$REPO_BRANCH" "$REPO_URL" /workspace/kagent
          cd /workspace/kagent
          uv pip install --system -e .
          cd "$ORGANIZER_WORKDIR"
          python prepare_splits.py
        envFrom:
        - configMapRef:
            name: kagent-config-{{COMPETITION_LABEL}}-prepare
        env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: kagent-secrets
              key: github-token
        resources:
          requests:
            cpu: "8"
            memory: "64Gi"
          limits:
            cpu: "16"
            memory: "128Gi"
        volumeMounts:
        - name: dataset
          mountPath: /mnt/new-pvc
      volumes:
      - name: dataset
        persistentVolumeClaim:
          claimName: new-pvc
